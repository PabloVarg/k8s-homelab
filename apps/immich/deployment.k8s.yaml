apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: default
  labels:
    app: immich
spec:
  selector:
    matchLabels:
      app: immich
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container:  immich
      labels:
        app: immich
    spec:
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
      containers:
      - name: immich
        image: ghcr.io/imagegenius/immich:noml
        imagePullPolicy: Always
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
        ports:
        - containerPort: 8080
          name: immich
        volumeMounts:
          - name: config
            mountPath: /config
          - name: photos
            mountPath: /photos
          - name: libraries
            mountPath: /libraries
          - name: dri
            mountPath: /dev/dri
            readOnly: true
        envFrom:
          - configMapRef:
              name: immich
        env:
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: main-cluster-app
                key: user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: main-cluster-app
                key: password
      volumes:
        - name: config
          hostPath:
            path: /mnt/user/appdata/immich
            type: DirectoryOrCreate
        - name: photos
          hostPath:
            path: /mnt/user/Files/immich/photos
            type: DirectoryOrCreate
        - name: libraries
          hostPath:
            path: /mnt/user/Files/filebrowser/srv/
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory

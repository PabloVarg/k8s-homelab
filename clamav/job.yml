apiVersion: batch/v1
kind: Job
metadata:
  name: clamav
  namespace: default
  labels:
    app: clamav
spec:
  template:
    metadata:
      name: clamav
      labels:
        app: clamav
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: clamav
        image: clamav/clamav:latest_base
        command: ["sh"]
        args: ["-c", "freshclam && clamscan --recursive /scan"]
        resources:
          limits:
            cpu: 500m
        volumeMounts:
          - name: signatures
            mountPath: /var/lib/clamav
          - name: downloads
            mountPath: /scan/downloads
            readOnly: true
            recursiveReadOnly: Enabled
          - name: syncthing
            mountPath: /scan/syncthing
            readOnly: true
            recursiveReadOnly: Enabled
      restartPolicy: OnFailure
      volumes:
        - name: signatures
          hostPath:
            path: /mnt/user/appdata/clamav
            type: DirectoryOrCreate
        - name: downloads
          hostPath:
            path: /mnt/user/Downloads/downloads
            type: Directory
        - name: syncthing
          hostPath:
            path: /mnt/user/Files/syncthing
            type: Directory
